- name: Fetch weather (Open-Meteo)
  run: |
    curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

- name: Parse weather
  run: |
    TEMP=$(cat weather.json | jq '.current_weather.temperature')
    WIND=$(cat weather.json | jq '.current_weather.windspeed')

    echo "TEMP=$TEMP" >> $GITHUB_ENV
    echo "WIND=$WIND" >> $GITHUB_ENV

- name: Decide based on weather
  run: |
    if (( $(echo "$TEMP > 30" | bc -l) )); then
      echo "STATE=WARNING 🟡" >> $GITHUB_ENV
      echo "REASON=Too hot" >> $GITHUB_ENV
    elif (( $(echo "$TEMP < 10" | bc -l) )); then
      echo "STATE=CRITICAL 🔴" >> $GITHUB_ENV
      echo "REASON=Too cold" >> $GITHUB_ENV
    else
      echo "STATE=HEALTHY 🟢" >> $GITHUB_ENV
      echo "REASON=Good weather" >> $GITHUB_ENV
    fi

- name: Generate README
  run: |
    echo "# 🚀 Go Auto Engine" > README.md
    echo "" >> README.md
    echo "## 🌐 Real Data System" >> README.md
    echo "- Temperature: ${TEMP}°C" >> README.md
    echo "- Wind Speed: ${WIND} km/h" >> README.md
    echo "" >> README.md
    echo "## 🧠 Decision" >> README.md
    echo "- Status: $STATE" >> README.md
    echo "- Reason: $REASON" >> README.md
    echo "- Time: $(date)" >> README.md
