name: go-auto-engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Fetch data
      - name: Fetch weather
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

      # ✅ Extract (safe)
      - name: Extract values
        run: |
          TEMP=$(jq '.current_weather.temperature' weather.json)
          WIND=$(jq '.current_weather.windspeed' weather.json)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV

      # ✅ Simple logic (ไม่ใช้ bc)
      - name: Logic
        run: |
          if [ "$TEMP" -gt 30 ]; then
            STATUS="HOT"
          else
            STATUS="OK"
          fi

          echo "STATUS=$STATUS" >> $GITHUB_ENV

      # ✅ Update CSV (format เดียวเท่านั้น!)
      - name: Update CSV
        run: |
          echo "$TEMP" >> temp.csv

      # ✅ Generate simple graph (ไม่ใช้ lib)
      - name: Generate graph (simple SVG)
        run: |
          echo "<svg xmlns='http://www.w3.org/2000/svg' width='300' height='100'>
          <text x='10' y='50' fill='white'>Temp: $TEMP</text>
          </svg>" > graph.svg

      # ✅ Update JSON
      - name: Update JSON
        run: |
          echo "{
            \"temp\": $TEMP,
            \"wind\": $WIND,
            \"status\": \"$STATUS\"
          }" > data.json

      # ✅ Commit (กันพัง)
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"

          git add .
          git commit -m "safe update" || echo "no change"
          git push
