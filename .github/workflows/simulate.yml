name: go-auto-engine-ai

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install tools
      - name: Install tools
        run: sudo apt-get install -y jq bc

      # 3. Fetch weather data
      - name: Fetch weather
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

          TEMP=$(cat weather.json | jq '.current_weather.temperature')
          WIND=$(cat weather.json | jq '.current_weather.windspeed')

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV

      # 4. Decide state
      - name: AI decision
        run: |
          if (( $(echo "$TEMP > 30" | bc -l) )); then
            STATE="WARNING"
            REASON="Too hot"
          elif (( $(echo "$TEMP < 10" | bc -l) )); then
            STATE="CRITICAL"
            REASON="Too cold"
          else
            STATE="HEALTHY"
            REASON="Normal condition"
          fi

          echo "STATE=$STATE" >> $GITHUB_ENV
          echo "REASON=$REASON" >> $GITHUB_ENV

      # 5. Prediction (trend)
      - name: Predict trend
        run: |
          if [ ! -f history.txt ]; then
            echo "$TEMP" > history.txt
          else
            echo "$TEMP" >> history.txt
          fi

          LAST=$(tail -n 2 history.txt | head -n 1)
          if (( $(echo "$TEMP > $LAST" | bc -l) )); then
            TREND="UP"
          elif (( $(echo "$TEMP < $LAST" | bc -l) )); then
            TREND="DOWN"
          else
            TREND="STABLE"
          fi

          echo "TREND=$TREND" >> $GITHUB_ENV

      # 6. Generate graph (FIXED multiline bug)
      - name: Generate graph
        run: |
          GRAPH=""
          for T in $(tail -n 10 history.txt); do
            BAR=$(printf "%0.s#" $(seq 1 ${T%.*}))
            GRAPH="$GRAPH\n$BAR"
          done

          echo "GRAPH<<EOF" >> $GITHUB_ENV
          echo -e "$GRAPH" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 7. Generate README dashboard
      - name: Generate README
        run: |
          echo "# 🚀 Go Auto Engine Dashboard" > README.md
          echo "" >> README.md

          echo "## 🌡️ Live Data" >> README.md
          echo "- Temperature: $TEMP °C" >> README.md
          echo "- Wind: $WIND km/h" >> README.md
          echo "" >> README.md

          echo "## 🤖 AI Analysis" >> README.md
          echo "- Status: $STATE" >> README.md
          echo "- Reason: $REASON" >> README.md
          echo "- Trend: $TREND" >> README.md
          echo "- Updated: $(date)" >> README.md
          echo "" >> README.md

          echo "## 📊 Graph" >> README.md
          echo '```' >> README.md
          echo -e "$GRAPH" >> README.md
          echo '```' >> README.md
          echo "" >> README.md

          echo "## 🧠 System Flow" >> README.md
          echo "Weather → Analyze → Decide → Predict → Update" >> README.md
          echo "" >> README.md

          echo "## 📜 History" >> README.md
          tail -n 5 history.txt >> README.md

      # 8. Commit & push
      - name: Commit changes
        run: |
          git config user.name "auto-engine-bot"
          git config user.email "bot@auto-engine.com"
          git add .
          git commit -m "AI auto update" || echo "no changes"
          git push
