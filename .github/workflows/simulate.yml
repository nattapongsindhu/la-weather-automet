name: go-auto-engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Fetch weather
      - name: Fetch weather
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

      # ✅ Parse JSON (ใช้ jq อย่างเดียว ไม่พัง)
      - name: Parse data
        run: |
          TEMP=$(jq '.current_weather.temperature' weather.json)
          WIND=$(jq '.current_weather.windspeed' weather.json)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV

      # ✅ Logic (เอา bc ออก → กันพัง)
      - name: AI logic
        run: |
          if [ "$TEMP" -gt 30 ]; then
            STATUS="WARNING"
            SCORE=60
          elif [ "$TEMP" -lt 10 ]; then
            STATUS="CRITICAL"
            SCORE=30
          else
            STATUS="HEALTHY"
            SCORE=90
          fi

          echo "STATUS=$STATUS" >> $GITHUB_ENV
          echo "SCORE=$SCORE" >> $GITHUB_ENV

      # ✅ Create CSV (กันไฟล์หาย)
      - name: Update CSV
        run: |
          touch temp.csv
          echo "$(date +%s),$TEMP" >> temp.csv

      # ✅ Generate graph (ใช้ python แทน gnuplot = เสถียรสุด)
      - name: Generate graph PNG
        run: |
          python3 <<EOF
import matplotlib.pyplot as plt
import csv

x = []
y = []

with open('temp.csv') as f:
    reader = csv.reader(f)
    for row in reader:
        if len(row) == 2:
            x.append(int(row[0]))
            y.append(float(row[1]))

plt.figure(figsize=(8,4))
plt.plot(x, y)
plt.title("Temperature History")
plt.xlabel("Time")
plt.ylabel("Temp")
plt.savefig("graph.png")
EOF

      # ✅ Update JSON
      - name: Update JSON
        run: |
          echo "{
            \"temp\": $TEMP,
            \"wind\": $WIND,
            \"status\": \"$STATUS\",
            \"trend\": \"Stable\",
            \"score\": $SCORE,
            \"updated\": \"$(date)\"
          }" > data.json

      # ✅ Commit (กัน fail ถ้าไม่มี change)
      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"

          git add .
          git commit -m "auto update" || echo "no changes"
          git push
