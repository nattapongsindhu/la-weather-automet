name: LA Weather Automet

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: weather-pipeline
  cancel-in-progress: false

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Fetch weather (with retry)
        run: |
          for i in 1 2 3; do
            curl -sf "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json
            if [ -s weather.json ]; then
              echo "Fetch OK on attempt $i"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 3
          done
          if [ ! -s weather.json ]; then
            echo "ERROR: all fetch attempts failed" && exit 1
          fi

      - name: Parse data
        run: |
          TEMP=$(jq '.current_weather.temperature' weather.json)
          WIND=$(jq '.current_weather.windspeed' weather.json)
          DIRECTION=$(jq '.current_weather.winddirection' weather.json)
          IS_DAY=$(jq '.current_weather.is_day' weather.json)

          if [ -z "$TEMP" ] || [ "$TEMP" = "null" ]; then
            echo "ERROR: failed to parse weather data" && exit 1
          fi

          echo "TEMP=$TEMP"           >> $GITHUB_ENV
          echo "WIND=$WIND"           >> $GITHUB_ENV
          echo "DIRECTION=$DIRECTION" >> $GITHUB_ENV
          echo "IS_DAY=$IS_DAY"       >> $GITHUB_ENV

      - name: Run tests
        run: |
          pip install pytest --break-system-packages -q
          python3 -m pytest tests/ -v

      - name: Analyze
        run: python3 scripts/analyze.py
        env:
          TEMP: ${{ env.TEMP }}
          WIND: ${{ env.WIND }}

      - name: Update CSV (trim to 200 rows)
        run: |
          TIMESTAMP=$(date -u "+%Y-%m-%dT%H:%M")
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV

          if [ ! -f temp.csv ] || ! head -1 temp.csv | grep -q "timestamp"; then
            echo "timestamp,temperature,wind" > temp.csv
          fi
          echo "$TIMESTAMP,$TEMP,$WIND" >> temp.csv

          HEAD=$(head -1 temp.csv)
          TAIL=$(tail -n +2 temp.csv | tail -200)
          { echo "$HEAD"; echo "$TAIL"; } > temp_new.csv
          mv temp_new.csv temp.csv

      - name: Generate SVG
        run: python3 scripts/generate_svg.py

      - name: Update data.json and history.txt
        run: python3 scripts/update_data.py
        env:
          TEMP:      ${{ env.TEMP }}
          WIND:      ${{ env.WIND }}
          DIRECTION: ${{ env.DIRECTION }}
          IS_DAY:    ${{ env.IS_DAY }}
          STATUS:    ${{ env.STATUS }}
          TREND:     ${{ env.TREND }}
          SCORE:     ${{ env.SCORE }}
          ANOMALY:   ${{ env.ANOMALY }}

      - name: Validate data
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("data.json") as f:
              d = json.load(f)
          errors = []
          if not isinstance(d.get("temp"), (int, float)):  errors.append("temp missing")
          if not isinstance(d.get("wind"), (int, float)):  errors.append("wind missing")
          if d.get("status") not in ["OK","WARM","HOT","COLD"]: errors.append("invalid status")
          if not isinstance(d.get("score"), int):          errors.append("score missing")
          if not d.get("updated"):                         errors.append("updated missing")
          if not d.get("sha256"):                          errors.append("sha256 missing")
          if errors:
              print("VALIDATION FAILED:", errors)
              sys.exit(1)
          print(f"OK: temp={d['temp']} status={d['status']} score={d['score']}")
          EOF

      - name: Commit
        run: |
          git config user.name "nattapongsindhu"
          git config user.email "268273891+nattapongsindhu@users.noreply.github.com"

          git add temp.csv graph.svg data.json history.txt weather.json
          git diff --cached --quiet && echo "no change, skipping" && exit 0

          LABEL="${STATUS}"
          [ -n "$ANOMALY" ] && LABEL="${STATUS}+ANOMALY"
          git commit -m "data: ${TEMP}°C wind ${WIND}km/h [${LABEL}]"
          
          git pull --rebase origin main
          git push
