- name: Generate graph
  run: |
    echo "<svg width='500' height='200' xmlns='http://www.w3.org/2000/svg'>" > graph.svg

    X=20
    POINTS=""

    while read VALUE; do
      Y=$((200 - VALUE * 3))
      POINTS="$POINTS $X,$Y"
      X=$((X+20))
    done < temp.csv

    echo "<polyline points='$POINTS' fill='none' stroke='blue' stroke-width='2'/>" >> graph.svg

    echo "</svg>" >> graph.svg
