name: Go Auto Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch weather
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

      - name: Parse data
        run: |
          TEMP=$(jq '.current_weather.temperature' weather.json)
          WIND=$(jq '.current_weather.windspeed' weather.json)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV

      - name: AI logic
        run: |
          if (( $(echo "$TEMP > 25" | bc -l) )); then
            STATUS="HOT"
            TREND="Rising"
          else
            STATUS="OK"
            TREND="Stable"
          fi

          SCORE=$(printf "%.0f" $(echo "$TEMP * 2" | bc))

          echo "STATUS=$STATUS" >> $GITHUB_ENV
          echo "TREND=$TREND" >> $GITHUB_ENV
          echo "SCORE=$SCORE" >> $GITHUB_ENV

      - name: Update files
        run: |
          echo "$(date),$TEMP" >> temp.csv

          echo "<svg width='500' height='200' xmlns='http://www.w3.org/2000/svg'>" > graph.svg
          echo "<polyline fill='none' stroke='#00ffcc' stroke-width='2' points='" >> graph.svg
          awk -F',' '{printf "%d,%d ", NR*40, 200-$2*5}' temp.csv >> graph.svg
          echo "'/>" >> graph.svg
          echo "</svg>" >> graph.svg

          echo "{
            \"temp\": $TEMP,
            \"wind\": $WIND,
            \"status\": \"$STATUS\",
            \"trend\": \"$TREND\",
            \"score\": $SCORE
          }" > data.json

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add .
          git commit -m "go-auto-engine: auto update" || echo "no change"
          git push
