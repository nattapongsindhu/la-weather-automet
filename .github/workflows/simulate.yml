name: go-auto-engine

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout
    - name: Checkout repo
      uses: actions/checkout@v4

    # 2. Fetch weather
    - name: Fetch weather
      run: |
        curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

    # 3. Parse data
    - name: Parse weather
      run: |
        TEMP=$(jq '.current_weather.temperature' weather.json)
        WIND=$(jq '.current_weather.windspeed' weather.json)

        echo "TEMP=$TEMP" >> $GITHUB_ENV
        echo "WIND=$WIND" >> $GITHUB_ENV

    # 4. AI decision
    - name: AI Decision
      run: |
        if [ "$TEMP" -gt 30 ]; then
          STATUS="WARNING"
          STATE="🟡"
          COLOR="yellow"
          REASON="High temperature may reduce system efficiency"

        elif [ "$TEMP" -lt 10 ]; then
          STATUS="CRITICAL"
          STATE="🔴"
          COLOR="red"
          REASON="Low temperature may affect system stability"

        else
          STATUS="HEALTHY"
          STATE="🟢"
          COLOR="brightgreen"
          REASON="System operating under optimal conditions"
        fi

        echo "STATUS=$STATUS" >> $GITHUB_ENV
        echo "STATE=$STATE" >> $GITHUB_ENV
        echo "COLOR=$COLOR" >> $GITHUB_ENV
        echo "REASON=$REASON" >> $GITHUB_ENV

    # 5. Load + update history
    - name: Update history
      run: |
        if [ -f history.txt ]; then
          HISTORY=$(cat history.txt)
        else
          HISTORY=""
        fi

        NEW_HISTORY="$STATE $HISTORY"
        NEW_HISTORY=$(echo $NEW_HISTORY | cut -d ' ' -f1-10)

        echo "$NEW_HISTORY" > history.txt
        echo "NEW_HISTORY=$NEW_HISTORY" >> $GITHUB_ENV

    # 6. Trend
    - name: Analyze trend
      run: |
        GREEN=$(echo "$NEW_HISTORY" | grep -o "🟢" | wc -l)
        RED=$(echo "$NEW_HISTORY" | grep -o "🔴" | wc -l)

        if [ "$RED" -gt "$GREEN" ]; then
          TREND="📉 Declining"
        else
          TREND="📈 Stable"
        fi

        echo "TREND=$TREND" >> $GITHUB_ENV

    # 7. Generate UI Dashboard
    - name: Generate README
      run: |
        echo "# 🚀 Go Auto Engine Dashboard" > README.md
        echo "" >> README.md

        echo "![Status](https://img.shields.io/badge/status-$STATUS-$COLOR)" >> README.md
        echo "![Auto](https://img.shields.io/badge/automation-active-blue)" >> README.md
        echo "" >> README.md

        echo "## 🌐 Live Data" >> README.md
        echo "- 🌡 Temperature: ${TEMP}°C" >> README.md
        echo "- 💨 Wind: ${WIND} km/h" >> README.md
        echo "" >> README.md

        echo "## 🧠 AI Analysis" >> README.md
        echo "- Status: $STATE $STATUS" >> README.md
        echo "- Insight: $REASON" >> README.md
        echo "- Trend: $TREND" >> README.md
        echo "- Updated: $(date)" >> README.md
        echo "" >> README.md

        echo "## 📊 System Flow" >> README.md
        echo '```mermaid' >> README.md
        echo "flowchart LR" >> README.md

        COUNT=1
        for item in $NEW_HISTORY; do
          echo "S$COUNT[$item] -->" >> README.md
          COUNT=$((COUNT+1))
        done

        echo "END" >> README.md
        echo '```' >> README.md

        echo "" >> README.md
        echo "## 📜 History" >> README.md
        echo "$NEW_HISTORY" >> README.md
        echo "" >> README.md

        echo "---" >> README.md
        echo "⚡ Powered by GitHub Actions + Open-Meteo API" >> README.md

    # 8. Commit
    - name: Commit & push
      run: |
        git config user.name "auto-engine-bot"
        git config user.email "bot@auto-engine.com"
        git add README.md history.txt
        git commit -m "✨ UI dashboard update" || echo "no changes"
        git push
