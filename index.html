<!DOCTYPE html>
<html>
<head>
  <title>AI Engine Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #38bdf8;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 10px;
      border-radius: 12px;
      width: 300px;
    }

    .big {
      font-size: 28px;
      margin: 10px 0;
    }

    .healthy { color: #22c55e; }
    .warning { color: #facc15; }
    .danger { color: #ef4444; }

    canvas {
      max-width: 700px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🚀 AI Monitoring Dashboard</h1>

<div class="container">

  <div class="card">
    <h3>🌡 Temperature</h3>
    <div class="big" id="temp">--</div>
  </div>

  <div class="card">
    <h3>💨 Wind</h3>
    <div class="big" id="wind">--</div>
  </div>

  <div class="card">
    <h3>🤖 Status</h3>
    <div class="big" id="status">--</div>
  </div>

  <div class="card">
    <h3>📈 Trend</h3>
    <div class="big" id="trend">--</div>
  </div>

  <div class="card">
    <h3>🧮 Score</h3>
    <div class="big" id="score">--</div>
  </div>

</div>

<canvas id="chart"></canvas>

<script>

let chart;
let history = [];

async function loadData() {

  const res = await fetch('./data.json');
  const d = await res.json();

  // UI update
  document.getElementById('temp').innerText = d.temp + "°C";
  document.getElementById('wind').innerText = d.wind + " km/h";

  let statusClass = "healthy";
  if (d.status === "WARNING") statusClass = "warning";
  if (d.status === "CRITICAL" || d.status === "DANGER") statusClass = "danger";

  document.getElementById('status').innerHTML =
    `<span class="${statusClass}">${d.status}</span>`;

  document.getElementById('trend').innerText = d.trend;
  document.getElementById('score').innerText = d.score;

  // push history
  history.push(d.temp);

  if (history.length > 20) history.shift();

  updateChart();
}

function updateChart() {

  if (!chart) {
    chart = new Chart(document.getElementById('chart'), {
      type: 'line',
      data: {
        labels: history.map((_, i) => i),
        datasets: [{
          label: 'Temperature Trend',
          data: history,
          tension: 0.3,
          borderWidth: 2
        }]
      }
    });
  } else {
    chart.data.labels = history.map((_, i) => i);
    chart.data.datasets[0].data = history;
    chart.update();
  }
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
